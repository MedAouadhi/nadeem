services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nadeem
      POSTGRES_USER: nadeem
      POSTGRES_PASSWORD: nadeem_dev
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nadeem"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6381:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nadeem
      MINIO_ROOT_PASSWORD: nadeem_dev_password
    volumes: [miniodata:/data]
    ports: ["9004:9000", "9005:9001"]

  minio-bootstrap:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 nadeem nadeem_dev_password; do sleep 1; done;
      /usr/bin/mc mb -p local/nadeem-audio || true;
      /usr/bin/mc anonymous set download local/nadeem-audio || true;
      "

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 nadeem.asgi:application"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes: ["./backend:/app"]
    ports: ["8001:8000"]

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    depends_on: [backend]
    volumes: ["./frontend:/app", "/app/node_modules"]
    ports: ["3001:3000"]

volumes:
  pgdata: {}
  miniodata: {}
