name: nadeem_mobile
description: Nadeem device companion app — onboarding and provisioning.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  dio: ^5.4.3
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.7
  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  # Secure storage
  flutter_secure_storage: ^9.2.2
  # Platform Wi-Fi
  wifi_iot: ^0.3.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  # Tests
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
